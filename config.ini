[thresholds]
; Alert when usage exceeds these percentages (0-100)
cpu = 90
ram = 90
disk = 90

[alerts]
; Minimum minutes between re-alerting for the same metric (prevents email spam)
cooldown_minutes = 15
; Enable/disable email alerts
enabled = false

[email]
; SMTP server (e.g., smtp.gmail.com, smtp.outlook.com)
smtp_server = smtp.gmail.com
smtp_port = 587
; Your email address
username = your-email@gmail.com
; Password - set SMTP_PASSWORD environment variable instead for security
; Or leave empty and set env: set SMTP_PASSWORD=your-app-password
password =
; Recipient email for alerts
recipient = your-email@gmail.com
